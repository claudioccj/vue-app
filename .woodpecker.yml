when:
  - event: push
    branch: main

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
        branch: main
    settings:
      repo: ghcr.io/claudioccj/vue-app
      registry: ghcr.io
      username:
        from_secret: GITHUB_USERNAME
      password:
        from_secret: GITHUB_TOKEN
      tags:
        - latest
        - ${CI_COMMIT_SHA}

  - name: update-deployment
    image: alpine/git
    when:
      - event: push
        branch: main
    environment:
      GITHUB_USERNAME:
        from_secret: GITHUB_USERNAME
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - apk add --no-cache git
      - git config user.email ci@woodpecker
      - git config user.name Woodpecker
      - git remote set-url origin https://$GITHUB_USERNAME:$GITHUB_TOKEN@github.com/claudioccj/vue-app.git
      - sed -i "s|ghcr.io/claudioccj/vue-app:.*|ghcr.io/claudioccj/vue-app:$CI_COMMIT_SHA|g" k8s/deployment.yaml
      - git add k8s/deployment.yaml
      - git diff --cached --quiet || git commit -m "ci update image to $CI_COMMIT_SHA [skip ci]"
      - git push --set-upstream origin main
