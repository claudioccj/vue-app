apiVersion: apps/v1
kind: Deployment
metadata:
  name: vue-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vue-app
  template:
    metadata:
      labels:
        app: vue-app
    spec:
      containers:
        - name: vue-app
          image: ghcr.io/claudioccj/vue-app:fdda325cc5f2f97a777c00a928ef0688ce4efa51
          ports:
            - containerPort: 80
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ghcr-secret
